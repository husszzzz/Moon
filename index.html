<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUB HUSSAIN 365 - PRO LEAGUE</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        :root { --gold: #ffd700; --bg: #000000; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.1); }
        @keyframes pulse {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.05); opacity: 0.8; }
    100% { transform: scale(1); opacity: 1; }
/* --- تأثير التوهج الملكي للمتصدر --- */
@keyframes leader-glow {
    0% { box-shadow: 0 0 5px rgba(255, 215, 0, 0.4); border-color: rgba(255, 215, 0, 0.4); }
    50% { box-shadow: 0 0 25px rgba(255, 215, 0, 0.9), 0 0 35px rgba(255, 215, 0, 0.6); border-color: rgba(255, 215, 0, 1); }
    100% { box-shadow: 0 0 5px rgba(255, 215, 0, 0.4); border-color: rgba(255, 215, 0, 0.4); }
}

.table-leader-row {
    animation: leader-glow 2s infinite !important; /* التأثير وامض ولانهائي */
    border: 1px solid var(--gold) !important;
    background: linear-gradient(90deg, rgba(0,0,0,1) 0%, rgba(30,24,0,1) 50%, rgba(0,0,0,1) 100%) !important; /* خلفية ذهبية معتمة */
    transform: scale(1.03); /* تكبير بسيط للصف ليبرز */
    z-index: 10;
    transition: transform 0.3s ease;
}

/* إضافة أيقونة تاج صغيرة قبل اسم المتصدر (اختياري، يضيف فخامة) */
.table-leader-row td:nth-child(2)::before {
    content: "🏆 "; /* يمكنك استبدالها بـ "👑 " إذا فضلت */
    font-size: 1rem;
    margin-right: 5px;
}

        }

        body { background-color: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; overflow-x: hidden; }

        /* شريط الأخبار الملكي */
        .news-ticker { background: rgba(212, 175, 55, 0.05); border-bottom: 1px solid var(--gold); height: 30px; display: flex; align-items: center; overflow: hidden; position: sticky; top: 70px; z-index: 999; backdrop-filter: blur(5px); }
        .ticker-content { display: inline-block; animation: ticker 30s linear infinite; color: var(--gold); font-size: 0.8rem; font-weight: bold; white-space: nowrap; padding-right: 100%; }
        @keyframes ticker { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        .header { background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .logo-text { font-weight: 900; font-size: 1.3rem; background: linear-gradient(to right, #fff, var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .nav-overlay { position: fixed; top: 0; right: -100%; width: 100%; height: 100%; background: rgba(0,0,0,0.98); backdrop-filter: blur(20px); z-index: 2000; transition: 0.4s; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .nav-overlay.active { right: 0; }
        .nav-link { font-size: 1.8rem; color: #fff; text-decoration: none; margin: 15px; font-weight: 900; }
        .nav-link:hover { color: var(--gold); }

        .container { max-width: 500px; margin: auto; padding: 20px; min-height: 80vh; }
        .glass-card { background: var(--glass); border: 1px solid var(--border); border-radius: 25px; padding: 25px; margin-bottom: 25px; backdrop-filter: blur(10px); }
        .card-title { color: var(--gold); font-size: 1.1rem; font-weight: 900; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

        /* التاج الذهبي للمتصدر */
        .rank-item { display: flex; justify-content: space-between; padding: 14px; background: rgba(255,255,255,0.02); border-radius: 12px; margin-bottom: 8px; align-items: center; border-right: 3px solid transparent; }
        .rank-item.top { border-right-color: var(--gold); background: linear-gradient(90deg, rgba(212,175,55,0.1), transparent); }
        .crown { color: var(--gold); text-shadow: 0 0 10px var(--red); font-size: 1.2rem; }

        /* بطاقات اللاعبين */
        .player-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .p-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 15px; padding: 15px; text-align: center; cursor: pointer; transition: 0.3s; display: flex; flex-direction: row-reverse; justify-content: center; align-items: center; gap: 8px; font-weight: bold;}
        .p-card:hover { border-color: var(--gold); }
        .fire-hero { grid-column: span 2; border: 2px solid #ff4444; background: rgba(255,0,0,0.08); box-shadow: 0 0 15px rgba(255,0,0,0.2); flex-direction: row;}

        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.92); z-index: 3000; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .modal-box { background: #111; border: 2px solid var(--gold); width: 80%; padding: 35px; border-radius: 25px; text-align: center; }

        .ticket { background: #111; padding: 18px; border-radius: 15px; border-left: 4px solid var(--gold); text-align: center; margin-bottom: 15px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 5px; }
        td { padding: 12px 5px; background: rgba(255,255,255,0.02); text-align: center; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="header">
    <div onclick="toggleMenu()" style="cursor:pointer; color:var(--gold); font-size:1.5rem;"><i class="fas fa-bars-staggered"></i></div>
    <div style="text-align: center; margin-top: 5px;">
    <div style="font-size: 0.6rem; color: #ff4444; font-weight: bold; letter-spacing: 1px; text-shadow: 0 0 5px #ff0000;">  HASSANY</div>
    <div id="countdown" style="font-size: 1.2rem; font-weight: 900; color: var(--gold); text-shadow: 0 0 10px rgba(255,215,0,0.6), 0 0 20px rgba(255,68,68,0.4); font-family: monospace;">00:00:00</div>
</div>

            <div onclick="showPage('home')" style="color:var(--gold); cursor:pointer; font-size:1.4rem;"><i class="fas fa-house"></i></div>
</div>

<div class="news-ticker"><div class="ticker-content" id="news-text">جاري تحميل الأخبار الملكية...</div></div>

<div class="nav-overlay" id="navOverlay">
    <a href="#" class="nav-link" onclick="showPage('home')">الرئيسية <i class="fas fa-home-alt"></i></a>
    <a href="#" class="nav-link" onclick="showPage('matches')">المباريات <i class="fas fa-futbol"></i></a>
    <a href="#" class="nav-link" onclick="showPage('awards')">الجوائز <i class="fas fa-award"></i></a>
    <a href="#" class="nav-link" onclick="showPage('players')">اللاعبين <i class="fas fa-users"></i></a>
    <div onclick="toggleMenu()" style="margin-top:40px; color:var(--gold); font-size:2.2rem; cursor:pointer;"><i class="fas fa-times-circle"></i></div>
</div>

<div id="home-page" class="container">
    <div class="glass-card"><div class="card-title"><i class="fas fa-crown"></i> التصنيف العالمي</div><div id="world-rank"></div></div>
    <div class="glass-card"><div class="card-title"><i class="fas fa-list-ol"></i> ترتيب الدوري</div><table id="league-table"></table></div>
</div>

<div id="matches-page" class="container hidden">
    <div class="glass-card"><div class="card-title"><i class="fas fa-ticket-alt"></i> جدول المباريات</div><div id="next-matches"></div></div>
</div>

<div id="awards-page" class="container hidden">
    <div class="glass-card"><div class="card-title"><i class="fas fa-medal"></i> مرشحي البالون دور</div><div id="ballon-list"></div></div>
    <div class="glass-card"><div class="card-title"><i class="fas fa-fire"></i> صراع الهدافين</div><div id="scorers-list"></div></div>
    <div class="glass-card" style="background:none; border:none;"><div class="card-title"><i class="fas fa-star"></i> رجل الجولة</div><div id="motm-list"></div></div>
</div>

<div id="players-page" class="container hidden">
    <div class="player-grid" id="players-list"></div>
</div>

<div class="modal" id="pModal" onclick="this.style.display='none'"><div class="modal-box"><h2 id="mName" style="color:var(--gold)"></h2><p id="mInfo" style="line-height:1.8"></p></div></div>

<script>
    
    const url = "https://docs.google.com/spreadsheets/d/1-MToSjxxd5GTvmghx0MxkZJmU0gXOZbDPCt8-Q45Db8/export?format=csv";

    function toggleMenu() { document.getElementById('navOverlay').classList.toggle('active'); }
    function showPage(p) {
        ['home', 'matches', 'awards', 'players'].forEach(id => document.getElementById(id + '-page').classList.toggle('hidden', id !== p));
        if(document.getElementById('navOverlay').classList.contains('active')) toggleMenu();
        window.scrollTo(0,0);
    }
    function openP(n, i) { document.getElementById('mName').innerText = n; document.getElementById('mInfo').innerText = i; document.getElementById('pModal').style.display = 'flex'; }

    async function updateData() {
        try {
            const r = await fetch(url);
            const t = await r.text();
            const rows = t.split('\n').map(row => row.split(',').map(c => c.replace(/"/g, '').trim()));

            document.getElementById('news-text').innerText = rows[1][21] || "لا توجد أخبار حالياً";

            // التصنيف والدوري مع التاج الملكي
            let wr="", trs="";
            for(let i=1; i<=5; i++) if(rows[i][8]) wr += `<div class="rank-item ${i==1?'top':''}"><span>${i==1?'<i class="fas fa-crown crown"></i> ':i+'.'} ${rows[i][8]}</span><b style="color:var(--gold)">${rows[i][9]}</b></div>`;
            document.getElementById('world-rank').innerHTML = wr;
// كود فحص الخبر وتشغيل الصوت
let newsUpdate = rows[0][0]; // تأكد أن الخبر موجود في أول خلية بجدول جوجل (A1)
if (window.savedNews && window.savedNews !== newsUpdate) {
    new Audio('https://f.top4top.io/m_3766rbvfw2.mp3').play().catch(() => {});
}
window.savedNews = newsUpdate;

            let teams = rows.slice(1).map(r => ({ n: r[0], p: r[1], s: parseInt(r[5]) || 0 })).filter(x => x.n && x.n !== "الفريق").sort((a,b) => b.s - a.s);
            teams.forEach((x, i) => { trs += `<tr><td>${i==0?'<i class="fas fa-crown crown"></i>':i+1}</td><td style="text-align:right">${x.n}</td><td>${x.p}</td><td style="color:var(--gold)">${x.s}</td></tr>`; });
            document.getElementById('league-table').innerHTML = trs;

            // الجوائز (البلندور + الهدافين + MOTM)
            let bl="", sl="", motm="", pl="";
            for(let i=1; i<=5; i++) if(rows[i][11]) bl += `<div class="rank-item"><span><i class="fas fa-award" style="color:var(--gold)"></i> ${rows[i][11]}</span></div>`;
            for(let i=1; i<=5; i++) if(rows[i][13]) sl += `<div class="rank-item"><span>${rows[i][13]}</span><b style="background:var(--gold); color:#000; padding:2px 8px; border-radius:5px;">${rows[i][14]} هدف</b></div>`;
           if(rows[1][16]) motm = `<div class="p-card" style="position: relative; width: 250px; background: #0a0a0a; border: 2px solid #d4af37; border-radius: 20px; padding: 25px 15px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.9); font-family: 'Cairo', sans-serif; margin: 20px auto; display: block;">
    <div style="width: 115px; height: 115px; margin: 0 auto 15px; border-radius: 50%; border: 3px solid #d4af37; overflow: hidden; background: #1a1a1a; display: flex; align-items: center; justify-content: center;">
        <img src="${rows[0][15]}" style="width: 100%; height: 100%; object-fit: cover;" onerror="this.style.display='none'">
    </div>
    
    <div style="color: #d4af37; font-size: 11px; font-weight: bold; letter-spacing: 2px; margin-bottom: 5px; text-transform: uppercase;">Man of the Match</div>
    <div style="color: #fff; font-size: 1.5rem; font-weight: 900; text-shadow: 0 2px 10px rgba(0,0,0,0.5);">${rows[1][16]}</div>
    
    <div style="margin-top: 15px; height: 2px; background: linear-gradient(90deg, transparent, #d4af37, transparent);"></div>
</div>`;// --- كود تشكيلة الأسبوع الاحترافية ---
let totwHtml = `
<div style="margin: 40px auto; max-width: 450px; text-align: center; font-family: 'Cairo', sans-serif;">
    <h3 style="color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.3); margin-bottom: 20px;">🔥 تشكيلة الجوله</h3>
    <div style="position: relative; width: 100%; height: 550px; background: #000; border: 2px solid #d4af37; border-radius: 25px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.9);">
        
        <div style="position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: rgba(212,175,55,0.15);"></div>
        <div style="position: absolute; top: 50%; left: 50%; width: 120px; height: 120px; border: 1px solid rgba(212,175,55,0.15); border-radius: 50%; transform: translate(-50%, -50%);"></div>
        <div style="position: absolute; bottom: 0; left: 50%; width: 200px; height: 80px; border: 1px solid rgba(212,175,55,0.15); transform: translateX(-50%); border-radius: 10px 10px 0 0;"></div>

        ${renderPlayer(rows[2][12], rows[1][12], 'bottom: 25px; left: 50%')}   ${renderPlayer(rows[4][12], rows[3][12], 'bottom: 130px; left: 25%')} ${renderPlayer(rows[6][12], rows[5][12], 'bottom: 130px; left: 75%')} ${renderPlayer(rows[8][12], rows[7][12], 'top: 50%; left: 50%')}       ${renderPlayer(rows[10][12], rows[9][12], 'top: 80px; left: 30%')}    ${renderPlayer(rows[12][12], rows[11][12], 'top: 80px; left: 70%')}   </div>
</div>`;

function renderPlayer(img, name, pos) {
    if(!name || name.trim() == "") return "";
    return `
    <div style="position: absolute; ${pos}; transform: translate(-50%, -50%); text-align: center; width: 90px; z-index: 10;">
        <div style="width: 65px; height: 65px; border-radius: 50%; border: 2px solid #d4af37; overflow: hidden; margin: 0 auto; background: #111; box-shadow: 0 0 15px rgba(212,175,55,0.4);">
            <img src="${img}" style="width: 100%; height: 100%; object-fit: cover;" onerror="this.src='https://via.placeholder.com/65/000000/d4af37?text=Player'">
        </div>
        <div style="background: rgba(0,0,0,0.85); color: #fff; font-size: 10px; padding: 3px 6px; border-radius: 6px; border: 1px solid #d4af37; margin-top: 6px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${name}</div>
    </div>`;
}

// دمج التشكيلة مع رجل المباراة ليظهرا سوياً
motm += totwHtml;


            document.getElementById('ballon-list').innerHTML = bl;
            document.getElementById('scorers-list').innerHTML = sl;
            document.getElementById('motm-list').innerHTML = motm;

            // قسم اللاعبين
            if(rows[1][22]) pl += `<div class="p-card fire-hero" onclick="openP('${rows[1][22]}', '${rows[1][23]}')"><i class="fas fa-fire"></i> <span>${rows[1][22]}</span></div>`;
            for(let i=1; i<=12; i++) if(rows[i][24]) pl += `<div class="p-card" onclick="openP('${rows[i][24]}', '${rows[i][25]}')"><i class="fas fa-user-shield" style="color:var(--gold)"></i> <span>${rows[i][24]}</span></div>`;
            document.getElementById('players-list').innerHTML = pl;

            // المباريات
            let mx = ""; for(let i=1; i<=20; i++) if(rows[i][17]) mx += `<div class="ticket"><small style="color:var(--gold)">${rows[i][20]}</small><br><b>${rows[i][17]}  ${rows[i][18]}</b><br><small style="color:#777">${rows[i][19]}</small></div>`;
            document.getElementById('next-matches').innerHTML = mx;
        } catch(e) {}
    }
updateData(); setInterval(updateData, 20000);
setInterval(() => {
    const target = new Date("Apr 14, 2026 16:00:00").getTime();
    const now = new Date().getTime();
    const diff = target - now;

    const el = document.getElementById("countdown");
    if (diff < 0) {
        el.innerText = "بدأت البطولة!";
        el.style.color = "#ff4444";
    } else {
        const h = Math.floor(diff / (1000 * 60 * 60));
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diff % (1000 * 60)) / 1000);
        
        el.innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        
        // تأثير نبض خفيف إذا كان الوقت المتبقي أقل من ساعة
        if (h === 0) {
            el.style.animation = "pulse 1s infinite";
        }
    }
}, 1000);
// --- تفعيل تأثير المتصدر في الجدول ---
function highlightLeader() {
    // 1. إزالة التأثير القديم من أي فريق (في حال تغير المتصدر)
    const currentLeader = document.querySelector('#league-table tr.table-leader-row');
    if (currentLeader) {
        currentLeader.classList.remove('table-leader-row');
    }

    // 2. تحديد الصف الأول الجديد وإضافة التأثير إليه
    const rows = document.querySelectorAll('#league-table tr');
    if (rows.length > 0) {
        rows[0].classList.add('table-leader-row');
    }
}

// ------------------------------------
// تأكد من استدعاء highlightLeader() بعد أن يقوم كودك بعرض الجدول.
// في نهاية دالة updateData() الخاصة بك، يجب أن يبدو الأمر هكذا:
// ... (كودك لعرض الجدول)
// highlightLeader(); // استدعاء دالة التوهج
// }  <-- إغلاق دالة updateData()
// ------------------------------------

</script>
</body>
